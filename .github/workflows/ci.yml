name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'a34c873a9717a888f58dc05268dea15592c2f0ff'

      - name: Install dependencies
        run: vcpkg install sdl3 freetype zlib sdl3-image --triplet x64-windows

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DFLUENTUI_BUILD_TESTS=ON -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build --config Release

      - name: Run tests
        run: ctest --test-dir build --build-config Release --output-on-failure --timeout 60
        continue-on-error: true

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl-dev libfreetype-dev zlib1g-dev xvfb

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'a34c873a9717a888f58dc05268dea15592c2f0ff'

      - name: Install vcpkg dependencies
        run: vcpkg install sdl3 sdl3-image --triplet x64-linux

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DFLUENTUI_BUILD_TESTS=ON -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build --config Release

      - name: Run tests
        run: xvfb-run ctest --test-dir build --build-config Release --output-on-failure --timeout 60
        continue-on-error: true

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'a34c873a9717a888f58dc05268dea15592c2f0ff'

      - name: Install dependencies
        run: vcpkg install sdl3 freetype zlib sdl3-image --triplet x64-osx

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DFLUENTUI_BUILD_TESTS=ON -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build --config Release

      - name: Run tests
        run: ctest --test-dir build --build-config Release --output-on-failure --timeout 60
        continue-on-error: true
